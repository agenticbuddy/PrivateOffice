# PrivateOffice Workspace — development stack (single localhost origin).
# nginx is the only container that publishes a host port (80).
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || curl -sf http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

  editor:
    build:
      context: ./editor
      dockerfile: Dockerfile
      args:
        # Per-build cache-bust token baked into coolwsd's ver_suffix (see editor/Dockerfile)
        # so every /browser asset ETag changes once per patched build and returning browsers
        # refetch the corrected engine assets. Set to the git short SHA at build time:
        #   BUILD_ID=$(git rev-parse --short HEAD) docker compose build editor
        BUILD_ID: ${BUILD_ID:-dev}
    environment:
      - aliasgroup1=${WOPI_HOST_URL}
      # server_name MUST include the public port so CO builds the websocket URL as
      # ws://localhost:8088/cool/... (otherwise it drops the port and hits :80).
      - server_name=localhost:8088
      - username=${EDITOR_USERNAME}
      - password=${EDITOR_PASSWORD}
      - DONT_GEN_SSL_CERT=true
      # Privacy: no phone-home. Disable the update check (fetch_update_check=0) and the
      # update popup; welcome/feedback/buyproduct are neutralized in the image build.
      - extra_params=--o:ssl.enable=false --o:ssl.termination=false --o:net.frame_ancestors=${PUBLIC_ORIGIN} --o:logging.level=warning --o:fetch_update_check=0 --o:allow_update_popup=false --o:product_name=PrivateOffice
    cap_add:
      - MKNOD
    tty: true
    # the editor image has no curl/wget; use bash /dev/tcp to confirm coolwsd listens.
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/9980' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT}
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
      - MINIO_BUCKET=${MINIO_BUCKET}
      - EDITOR_INTERNAL_URL=${EDITOR_INTERNAL_URL}
      - WOPI_HOST_URL=${WOPI_HOST_URL}
      - PUBLIC_ORIGIN=${PUBLIC_ORIGIN}
      - SECRET_KEY=${SECRET_KEY}
      - SESSION_COOKIE=${SESSION_COOKIE}
      - STATIC_DIR=${STATIC_DIR}
      - BOOTSTRAP_ADMIN_EMAIL=${BOOTSTRAP_ADMIN_EMAIL}
      - BOOTSTRAP_ADMIN_NAME=${BOOTSTRAP_ADMIN_NAME}
      # macOS bind-mount file events don't reach the container; poll for --reload.
      - WATCHFILES_FORCE_POLLING=true
    # Backend is bind-mounted for fast reload; the SPA is baked into the image at build
    # time. Rebuild the image to pick up frontend changes:
    #   docker compose build app && docker compose up -d app
    volumes:
      - ./backend:/app/backend
    command: >
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/health').status==200 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 15s

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8088:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/htpasswd:/etc/nginx/htpasswd:ro
    depends_on:
      - app
      - editor

volumes:
  pgdata:
  miniodata:
