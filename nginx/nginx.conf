# Single localhost origin. Routes SPA/API/WOPI to app, editor assets/ws to editor.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name localhost;
    client_max_body_size 200m;

    # Re-resolve upstream names at request time via Docker's embedded DNS.
    # OSS nginx only defers DNS to runtime when a resolver is set AND the
    # proxy_pass target is a variable; otherwise the IP is frozen at config
    # parse time and a recreated container's new IP causes a 502 until reload.
    # Short valid= keeps recovery fast; ipv6=off skips AAAA lookups Docker
    # DNS won't usefully answer.
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $app    "app:8000";
    set $editor "editor:9980";

    # ---------- Editor ----------
    # Static assets + discovery + capabilities
    location ^~ /browser {
        proxy_pass http://$editor;
        proxy_set_header Host $host;
        # Own the /browser cache policy at the proxy (the correct layer for HTTP cache
        # semantics). coolwsd serves engine assets (bundle.js, l10n/ui-*.json, ...) under an
        # immutable version-hash path with Cache-Control: max-age=11059200 (128 days). Our
        # build-time content patches (editor/Dockerfile sed/cp) change the bytes but not that
        # hash, so without this a returning browser keeps its 128-day-fresh STALE copy after a
        # redeploy and never refetches. Override the TTL to force revalidation on every
        # document open; the per-build ver_suffix ETag (baked in editor/Dockerfile) then makes
        # an unchanged build 304 (cheap) and a patched build 200 with corrected bytes on first
        # paint. Keep the upstream ETag intact (do NOT hide it) so the 304 path still works.
        proxy_hide_header Cache-Control;
        add_header Cache-Control "no-cache" always;
    }
    location ^~ /hosting/discovery {
        proxy_pass http://$editor;
        proxy_set_header Host $host;
    }
    location ^~ /hosting/capabilities {
        proxy_pass http://$editor;
        proxy_set_header Host $host;
    }
    # WebSocket: tiles, editing, admin console
    location ^~ /cool {
        proxy_pass http://$editor;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 36000s;
    }

    # ---------- Admin (BasicAuth gate) ----------
    # Protection space covers /admin and everything deeper (incl. /admin/api/*),
    # so the browser resends credentials for admin XHR automatically.
    location /admin {
        auth_basic "Workspace Admin";
        auth_basic_user_file /etc/nginx/htpasswd;
        proxy_pass http://$app;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ---------- App: API, WOPI, SPA ----------
    location /api {
        proxy_pass http://$app;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location /wopi {
        proxy_pass http://$app;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location / {
        proxy_pass http://$app;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
