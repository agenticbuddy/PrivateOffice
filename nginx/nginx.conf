# Single localhost origin. Routes SPA/API/WOPI to app, editor assets/ws to editor.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name localhost;
    client_max_body_size 200m;

    # Re-resolve upstream names at request time via Docker's embedded DNS.
    # OSS nginx only defers DNS to runtime when a resolver is set AND the
    # proxy_pass target is a variable; otherwise the IP is frozen at config
    # parse time and a recreated container's new IP causes a 502 until reload.
    # Short valid= keeps recovery fast; ipv6=off skips AAAA lookups Docker
    # DNS won't usefully answer.
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $app    "app:8000";
    set $editor "editor:9980";

    # ---------- Editor ----------
    # cool.html — the editor bootstrap HTML — carries the per-build ?b=<BUILD_ID> query on every
    # asset ref (bundle.css/js, l10n JSON, …). coolwsd serves it under the FIXED base-version path
    # (/browser/<hash>/cool.html) with a STATIC ETag (the base hash, NOT the per-build ver_suffix),
    # so with plain no-cache a returning browser revalidates → 304 → keeps its CACHED cool.html →
    # loads the OLD ?b= tokens → the whole editor stays pinned to a stale bundle, even after a hard
    # reload (the SPA loads this iframe via JS, so the hard reload does not reach it). Force cool.html
    # to be uncacheable AND always a fresh 200: strip the ETag/Last-Modified and clear the client's
    # conditional headers so coolwsd cannot answer 304. This is what actually delivers editor updates.
    location ~ ^/browser/[^/]+/cool\.html {
        proxy_pass http://$editor;
        proxy_set_header Host $host;
        proxy_set_header If-None-Match "";
        proxy_set_header If-Modified-Since "";
        proxy_hide_header Cache-Control;
        proxy_hide_header ETag;
        proxy_hide_header Last-Modified;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }
    # Static assets + discovery + capabilities. Prefix (no ^~) so the cool.html regex above wins.
    location /browser {
        proxy_pass http://$editor;
        proxy_set_header Host $host;
        # Own the /browser cache policy at the proxy (the correct layer for HTTP cache
        # semantics). coolwsd serves engine assets (bundle.js, l10n/ui-*.json, ...) under an
        # immutable version-hash path with Cache-Control: max-age=11059200 (128 days). Our
        # build-time content patches (editor/Dockerfile sed/cp) change the bytes but not that
        # hash, so without this a returning browser keeps its 128-day-fresh STALE copy after a
        # redeploy and never refetches. Override the TTL to force revalidation on every
        # document open; the per-build ?b= token on each asset ref (from the always-fresh
        # cool.html above) then busts the cache by URL, so the corrected bytes paint on first load.
        proxy_hide_header Cache-Control;
        add_header Cache-Control "no-cache" always;
    }
    location ^~ /hosting/discovery {
        proxy_pass http://$editor;
        proxy_set_header Host $host;
    }
    location ^~ /hosting/capabilities {
        proxy_pass http://$editor;
        proxy_set_header Host $host;
    }
    # WebSocket: tiles, editing, admin console
    location ^~ /cool {
        proxy_pass http://$editor;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 36000s;
    }

    # ---------- Admin (BasicAuth gate) ----------
    # Protection space covers /admin and everything deeper (incl. /admin/api/*),
    # so the browser resends credentials for admin XHR automatically.
    location /admin {
        auth_basic "Workspace Admin";
        auth_basic_user_file /etc/nginx/htpasswd;
        proxy_pass http://$app;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ---------- App: API, WOPI, SPA ----------
    location /api {
        proxy_pass http://$app;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location /wopi {
        proxy_pass http://$app;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location / {
        proxy_pass http://$app;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
